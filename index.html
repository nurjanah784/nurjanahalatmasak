<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PinjamPro · login peminjaman alat masak</title>
    
    <!-- Favicon diganti dengan placeholder data URI agar tidak bergantung pada asset Laravel -->
    <link rel="icon" type="image/png" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23f163d5'/%3E%3Ctext x='50' y='67' font-size='50' text-anchor='middle' fill='white'%3E🍳%3C/text%3E%3C/svg%3E">

    <!-- Flowbite CSS -->
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
    
    <!-- Font Awesome untuk ikon alat masak yang lebih bagus -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ===== TEMA WARNA PREMIUM: ALAT MASAK ===== */
        :root {
            --primary: #f163d5;
            --primary-dark: #4f3945;
            --primary-light: #473a34;
            --secondary: #d458b1;
            --accent: #36322b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #e783cb;
            --background: #2d3238;
            --card-bg: #4c3b44;
            --text-primary: #b5749d;
            --text-secondary: #e8a8cf;
            --text-muted: #2b2f47;
            --border: #323840;
            --sidebar-bg: #cea8c3;
            --hover-bg: #2d343b;
        }

        /* ===== BASE ===== */
        body {
            background-color: var(--background);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        /* background section dengan tekstur alat masak */
        .bg-gray-50.dark\:bg-gray-900 {
            background-color: var(--background) !important;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(241, 99, 213, 0.06) 0px, transparent 30%),
                radial-gradient(circle at 85% 70%, rgba(212, 88, 177, 0.06) 0px, transparent 35%),
                repeating-linear-gradient(45deg, rgba(200, 140, 170, 0.02) 0px, rgba(200, 140, 170, 0.02) 2px, transparent 2px, transparent 8px);
            min-height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
        }

        /* card dengan efek seperti panel dapur */
        .dark\:bg-gray-800 {
            background-color: var(--card-bg) !important;
            border: 1px solid var(--border) !important;
            border-radius: 24px !important;
            box-shadow: 0 25px 40px -12px rgba(0,0,0,0.8), 0 4px 12px rgba(241, 99, 213, 0.2);
        }

        /* ===== TYPOGRAPHY ===== */
        h1, .dark\:text-white, label, .text-gray-900 {
            color: var(--text-secondary) !important;
        }

        h1 {
            font-size: 1.8rem;
            border-left: 5px solid var(--primary);
            padding-left: 1rem;
            margin-bottom: 0.5rem;
        }

        label {
            font-weight: 500;
            color: var(--text-primary) !important;
            letter-spacing: 0.3px;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* ===== INPUT FIELD ===== */
        input {
            background-color: #3a2f36 !important;
            border: 1.5px solid #5e4753 !important;
            border-radius: 40px !important;
            color: #f5ddee !important;
            padding: 0.9rem 1.2rem !important;
            font-size: 0.95rem;
            transition: all 0.25s ease;
            width: 100%;
        }

        input:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 0 4px rgba(241, 99, 213, 0.25) !important;
            background-color: #42353e !important;
            outline: none;
        }

        input::placeholder {
            color: #9a7c8f !important;
            opacity: 0.7;
        }

        /* ===== TOMBOL LOGIN ===== */
        button[type="submit"] {
            background: linear-gradient(145deg, var(--primary), #cf4bb0) !important;
            border: none !important;
            border-radius: 60px !important;
            padding: 0.9rem !important;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #221f1f !important;
            box-shadow: 0 10px 20px -8px #a03f86;
            transition: 0.2s;
            width: 100%;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background: linear-gradient(145deg, #f87be0, #d963bc) !important;
            box-shadow: 0 15px 25px -8px #b14e9a;
            transform: scale(1.02);
        }

        /* ===== LINK DAFTAR ===== */
        a.font-medium {
            color: var(--info) !important;
            font-weight: 600;
            text-decoration: underline wavy var(--primary) 1.5px;
            text-underline-offset: 4px;
        }

        a.font-medium:hover {
            color: var(--primary) !important;
        }

        /* ===== LOGO ALAT MASAK YANG BAGUS ===== */
        .logo-container {
            background: rgba(76, 59, 68, 0.7);
            padding: 0.8rem 2rem;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            border: 1px solid var(--border);
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            margin: 1rem 0 1.5rem 0;
        }

        .logo-container:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 25px rgba(241, 99, 213, 0.3);
            transform: translateY(-2px);
        }

        .cookware-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            font-size: 2.2rem;
            color: var(--primary);
            filter: drop-shadow(0 0 8px rgba(241, 99, 213, 0.5));
            animation: gentleFloat 3s ease-in-out infinite;
        }

        .logo-icon-secondary {
            font-size: 1.8rem;
            color: var(--secondary);
            margin-left: -5px;
            filter: drop-shadow(0 0 5px rgba(212, 88, 177, 0.5));
        }

        .logo-text {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .logo-text-main {
            color: #fad3ec;
            font-weight: 700;
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .logo-text-sub {
            color: var(--text-primary);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }

        /* ===== DECORATIVE COOKWARE ICONS ===== */
        .decor-icon {
            position: fixed;
            font-size: 2rem;
            color: rgba(241, 99, 213, 0.1);
            z-index: 0;
            pointer-events: none;
        }

        .decor-1 {
            top: 10%;
            left: 5%;
            transform: rotate(-15deg);
            font-size: 3rem;
        }

        .decor-2 {
            bottom: 10%;
            right: 5%;
            transform: rotate(20deg);
            font-size: 3.5rem;
        }

        .decor-3 {
            top: 40%;
            right: 10%;
            transform: rotate(45deg);
            font-size: 2.5rem;
        }

        /* ===== BADGE ALAT MASAK ===== */
        .tool-badge {
            background: var(--accent);
            color: var(--primary);
            font-size: 0.8rem;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            border: 1px solid var(--primary-dark);
            margin-left: 0.7rem;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* ===== ALERT NOTIFICATION ===== */
        .fixed.top-4.right-4 {
            border-radius: 30px !important;
            border-left: 8px solid;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 30px -10px black;
            padding: 1rem 1.5rem;
            max-width: 350px;
            z-index: 1000;
        }

        .bg-green-50 {
            background: rgba(36, 60, 46, 0.95) !important;
            border-left-color: var(--success) !important;
            color: #cdf5dc !important;
        }

        .bg-red-50 {
            background: rgba(71, 41, 48, 0.95) !important;
            border-left-color: var(--danger) !important;
            color: #ffd6d6 !important;
        }

        .text-green-800, .text-red-800 {
            color: inherit !important;
        }

        /* ===== FIX SCROLL ===== */
        .main-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .content-wrapper {
            width: 100%;
            max-width: 28rem;
            margin: 0 auto;
        }

        /* responsive untuk layar kecil */
        @media (max-width: 640px) {
            .main-container {
                padding: 1.5rem 1rem;
            }
            
            .logo-container {
                padding: 0.6rem 1.2rem;
            }
            
            .logo-text-main {
                font-size: 1.5rem;
            }
        }
    </style>

        .pt-4 {

</head>

    <!-- Tempat alert dinamis untuk menggantikan session flash karena versi static HTML -->
    <div id="dynamic-alert-container" style="position: fixed; top: 1.25rem; right: 1.25rem; z-index: 1000; display: flex; flex-direction: column; gap: 0.75rem;"></div>

    <script>
        // Fungsi untuk menampilkan notifikasi yang mirip dengan alert asli (sukses/error/info)
        function tampilkanAlert(message, type = 'success') {
            const container = document.getElementById('dynamic-alert-container');
            if (!container) return;
            
            const alertDiv = document.createElement('div');
            const isError = (type === 'error');
            const isInfo = (type === 'info');
            let bgClass = 'bg-green-50';
            let borderColor = 'border-green-500';
            let iconClass = 'fas fa-check-circle';
            if (isError) {
                bgClass = 'bg-red-50';
                borderColor = 'border-red-500';
                iconClass = 'fas fa-exclamation-circle';
            } else if (isInfo) {
                bgClass = 'bg-blue-50';
                borderColor = 'border-blue-500';
                iconClass = 'fas fa-info-circle';
                // stylenya disesuaikan dengan tema
            }
            // Terapkan gaya sesuai tema dengan warna dinamis
            alertDiv.className = `flex items-center p-4 mb-2 rounded-2xl shadow-2xl border-l-8 ${borderColor}`;
            alertDiv.style.background = isError ? 'rgba(71, 41, 48, 0.95)' : (isInfo ? 'rgba(37, 50, 70, 0.95)' : 'rgba(36, 60, 46, 0.95)');
            alertDiv.style.color = '#f0f0f0';
            alertDiv.style.backdropFilter = 'blur(10px)';
            alertDiv.style.minWidth = '260px';
            alertDiv.style.maxWidth = '360px';
            
            alertDiv.innerHTML = `
                <i class="${iconClass} flex-shrink-0 w-5 h-5" style="color: ${isError ? '#ef4444' : (isInfo ? '#3b82f6' : '#10b981')};"></i>
                <span class="sr-only">${type}</span>
                <div class="ms-3 text-sm font-medium">${escapeHtml(message)}</div>
                <button type="button" class="ms-auto bg-transparent rounded-full p-1.5 hover:bg-white/20 border-0 text-white" aria-label="Close" onclick="this.closest('.flex.items-center').remove()">
                    <i class="fas fa-times w-3 h-3"></i>
                </button>
            `;
            container.appendChild(alertDiv);
            
            // auto hilang setelah 4.5 detik
            setTimeout(() => {
                if (alertDiv && alertDiv.parentNode) {
                    alertDiv.style.transition = 'opacity 0.4s';
                    alertDiv.style.opacity = '0';
                    setTimeout(() => alertDiv.remove(), 400);
                }
            }, 4500);
        }
        
        // simple escape untuk mencegah XSS
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Menampilkan notifikasi untuk demo (menggantikan session laravel)
        function showInfoNotifikasi(pesan, tipe = 'info') {
            tampilkanAlert(pesan, tipe);
        }
        
        // Handler untuk form login (dummy, namun meniru perilaku alert sukses/error sesuai original)
        function handleDummyLogin(event) {
            event.preventDefault();
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const email = emailInput ? emailInput.value.trim() : '';
            const password = passwordInput ? passwordInput.value : '';
            
            // simulasi validasi sederhana: jika email dan password tidak kosong -> sukses, jika kosong -> error
            if (email === '' || password === '') {
                tampilkanAlert('Email dan kata sandi harus diisi!', 'error');
                // tambahan efek seperti error validation
                const errorAlert = document.createElement('div');
                // Tidak perlu karena sudah ditampilkan alert
                return;
            }
            
            // Simulasi login berhasil (karena tidak ada backend, memberikan pesan sukses layaknya session success)
            if (email.includes('@') && password.length >= 1) {
                tampilkanAlert('Selamat datang! Login berhasil. Anda akan diarahkan ke dashboard peminjaman.', 'success');
                // opsional: bisa reset form atau biarkan saja sebagai demo
                // Untuk meniru interaksi, tidak redirect tapi memberi notif sukses sesuai aslinya.
                // Di versi asli Laravel akan redirect, di sini cukup memberi efek sukses.
                // Juga bisa mengosongkan password untuk keamanan demo
                passwordInput.value = '';
            } else {
                tampilkanAlert('Login gagal. Periksa kembali email dan kata sandi Anda.', 'error');
            }
        }
        
        // Fungsi untuk menampilkan alert statis dari session jika ada (tapi di html statis kita bisa meniru demo notifikasi awal)
        // Karena kode asli memiliki @if(session('success')) dll, kita bisa menampilkan pesan sambutan opsional tanpa backend.
        window.addEventListener('DOMContentLoaded', () => {
            // optional: menampilkan notifikasi selamat datang seperti fitur demo tanpa mengganggu desain asli
            // tidak menampilkan otomatis agar tidak mengganggu. Namun agar mirip dengan kemungkinan ada session success dari controller asli, kita tidak menambah.
            // Tetap preserve style alert sukses apabila user melakukan login demo.
            
            // tambahan validasi untuk close button custom alert yang dihasilkan secara dinamis sudah berfungsi
            // Juga menghapus alert bawaan jika ada placeholder dari server side (tidak ada karena static)
            const existingAlerts = document.querySelectorAll('[id^="alert-"]');
            if (existingAlerts.length) {
                // tidak dihapus karena tidak ada di static, untuk jaga2 jika ada elemen ganjil
            }
        });
        
        // Override untuk link daftar yang smooth
        document.addEventListener('click', function(e) {
            const target = e.target.closest('a');
            if (target && target.getAttribute('href') === '#') {
                // Biarkan event listener di atas menangani jika ada onclick khusus, tidak mengganggu
                if (!target.hasAttribute('data-custom')) {
                    // Jika link hanya pagar dan tidak memiliki fungsi khusus, maka tidak perlu reload halaman.
                    e.preventDefault();
                }
            }
        });
        
        // Untuk tombol close pada alert static (tidak ada di HTML karena tidak pakai blade, namun jika ada legacy alert dari code asli tidak akan muncul)
        // Tidak ada alert statis bawaan karena kami hapus session blade. Tapi memastikan dynamic alert container berfungsi.
    </script>

    <!-- Flowbite JS -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>
    <!-- tambahan style ekstra untuk memperbaiki tampilan sesuai asli tanpa laravel mix -->
    <style>
        .text-primary-600 {
            color: var(--info) !important;
        }
        .dark\:text-primary-500 {
